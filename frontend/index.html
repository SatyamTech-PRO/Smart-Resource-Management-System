<!DOCTYPE html>
<html>
<head>
  <title>SRM System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
    <span class="logo">SRM System</span>
    <div class="nav-links">
      <a href="#request-form">New Request</a>
      <a href="#dashboard">Dashboard</a>
      <a href="#workers">Workers</a>
      <a href="#admin">Admin</a>
    </div>
  </nav>

  <section id="request-form">
    <h2>Raise a Service Request</h2>
    <form id="srm-form">
      <label>Service Type</label>
      <select name="serviceType" required>
        <option value="">-- Select --</option>
        <option>Electrical</option>
        <option>Plumbing</option>
        <option>Carpentry</option>
        <option>AC Repair</option>
        <option>Computer/IT</option>
      </select>

      <label>Description</label>
      <textarea name="description" rows="4" placeholder="Describe the issue..." required></textarea>

    

      <label>Location</label>
      <input type="text" name="location" placeholder="e.g. Block B, Room 204" required>

      <button type="submit">Submit Request</button>
    </form>
    <div id="form-msg"></div>
  </section>

  <section id="dashboard">
    <h2>Request Dashboard</h2>
    <div id="request-list"></div>
  </section>
<section id="workers">
  <h2>ITI Worker Panel</h2>
  <div style="margin-bottom:16px; display:flex; gap:12px; flex-wrap:wrap;">
    <input type="text" id="worker-search" placeholder="Search by skill or name..." style="flex:1; min-width:200px;">
    <select id="worker-filter">
      <option value="">All Skills</option>
      <option>Electrical</option>
      <option>Plumbing</option>
      <option>Carpentry</option>
      <option>AC Repair</option>
      <option>Computer/IT</option>
    </select>
  </div>
  <div id="worker-list"></div>
</section>

<section id="tracker">
  <h2>Job Status Tracker</h2>
  <p style="color:#999; font-size:14px; margin-bottom:20px;">Click any request in the dashboard to track it here.</p>
  <div id="tracker-content">
    <p style="color:#ccc;">No job selected yet.</p>
  </div>
</section>

<section id="admin">
  <h2>Admin Dashboard</h2>
  <div id="stats-grid" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:12px; margin-bottom:24px;"></div>
  <div id="admin-breakdown"></div>
</section>

  <script src="script.js"></script>
</body>
</html>
